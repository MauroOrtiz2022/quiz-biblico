<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Super preguntas rapidas Bíblicas</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.container {
  background: #0f172a;
  padding: 40px;
  border-radius: 20px;
  width: 600px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

h1 {
  font-size: 32px;
}

.progress {
  margin-bottom: 20px;
  font-size: 18px;
  opacity: 0.9;
}

.question {
  font-size: 26px;
  margin-bottom: 30px;
  min-height: 80px;
  line-height: 1.3;
}

.option {
  display: block;
  background: #f1f5f9;
  color: black;
  margin: 15px 0;
  padding: 18px;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 18px;
  font-weight: bold;
}

.option:hover {
  transform: scale(1.05);
}

.correct {
  background: #00e676 !important;
  color: black;
}

.wrong {
  background: #ff5252 !important;
  color: white;
}

button {
  margin-top: 25px;
  padding: 14px 30px;
  border: none;
  border-radius: 12px;
  background: #ffcc00;
  cursor: pointer;
  font-weight: bold;
  font-size: 18px;
}

button:hover {
  transform: scale(1.1);
}
</style>

</head>
<body>

<div class="container">
  <h1>Super preguntas rapidas Bíblicas</h1>
  <div class="progress" id="progress"></div>

  <div id="quiz">
    <div class="question" id="question"></div>
    <div id="options"></div>
    <button id="nextBtn" style="display:none;">Siguiente</button>
  </div>

  <div id="result" style="display:none;"></div>
</div>

<!-- SONIDOS -->
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

<script>
const questions = [
  {
    question: "¿Qué libros están antes y después de Juan?",
    options: ["Lucas y Hechos", "Lucas y Mateo", "Mateo y Marcos", "Hechos y Romanos"],
    answer: 0
  },
  {
    question: "¿A qué categoría pertenece el libro de Juan?",
    options: ["Evangelios", "Cartas de leyes", "Cánticos", "Profetas"],
    answer: 0
  },
  {
    question: "¿Qué libros están antes y después de Salmos?",
    options: ["Proverbios y Eclesiastés", "Proverbios y Cantares", "Job y Proverbios", "Job y Eclesiastés"],
    answer: 3
  },
  {
    question: "¿A qué categoría pertenece el libro de Miqueas?",
    options: ["Profetas Menores", "Profetas Mayores", "Evangelios", "Libros Poéticos"],
    answer: 1
  },
  {
    question: "¿Qué libros están antes y después de Gálatas?",
    options: ["1 Corintios y Efesios", "2 Corintios y Efesios", "1 Corintios y 2 Corintios", "Job y Eclesiastés"],
    answer: 2
  },
  {
    question: "¿A qué categoría pertenece el libro de Deuteronomio?",
    options: ["Profetas Menores", "Profetas Mayores", "Libros de la Ley", "Libros Poéticos"],
    answer: 3
  },
  {
    question: "¿Qué libros están antes y después de Santiago?",
    options: ["1 Pedro y 1 Juan", "Filemón y 1 Pedro", "1 Pedro y 2 Pedro", "Hebreos y 1 Pedro"],
    answer: 4
  },
  {
    question: "¿A que categoría pertenece el libro de Ezequiel?",
    options: ["Profetas Menores", "Profetas Mayores", "Libros de la Ley", "Libros Poéticos"],
    answer: 2
  }
];

let currentQuestion = 0;
let score = 0;
let answeredCorrectly = false;

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const resultEl = document.getElementById("result");
const progressEl = document.getElementById("progress");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

function loadQuestion() {
  answeredCorrectly = false;
  nextBtn.style.display = "none";
  optionsEl.innerHTML = "";

  const q = questions[currentQuestion];

  progressEl.textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
  questionEl.textContent = q.question;

  q.options.forEach((option, index) => {
    const div = document.createElement("div");
    div.textContent = option;
    div.classList.add("option");

    div.onclick = () => selectOption(div, index);

    optionsEl.appendChild(div);
  });
}

function selectOption(element, index) {
  if (answeredCorrectly) return;

  const correct = questions[currentQuestion].answer;

  if (index === correct) {
    element.classList.add("correct");
    correctSound.play();
    score++;
    answeredCorrectly = true;
    nextBtn.style.display = "block";

    document.querySelectorAll(".option").forEach(opt => {
      opt.style.pointerEvents = "none";
    });

  } else {
    element.classList.add("wrong");
    wrongSound.play();
  }
}

nextBtn.onclick = () => {
  currentQuestion++;

  if (currentQuestion < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
};

function showResult() {
  document.getElementById("quiz").style.display = "none";
  resultEl.style.display = "block";

  resultEl.innerHTML = `
    <h2>Resultado final</h2>
    <p style="font-size:22px;">${score} / ${questions.length}</p>
    <button onclick="restartQuiz()">Reiniciar</button>
  `;
}

function restartQuiz() {
  currentQuestion = 0;
  score = 0;
  document.getElementById("quiz").style.display = "block";
  resultEl.style.display = "none";
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
