<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Concurso Bíblico</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
  color: white;
  overflow: hidden;
}

/* CONTENEDOR */
.container {
  text-align: center;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* TITULO */
h1 {
  font-size: 50px;
  margin-bottom: 10px;
}

/* SCORE */
.scoreboard {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 22px;
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 10px;
}

/* PREGUNTA */
.question {
  font-size: 40px;
  margin: 40px;
  min-height: 120px;
}

/* OPCIONES */
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  width: 70%;
  margin: auto;
}

.option {
  padding: 25px;
  font-size: 22px;
  border-radius: 15px;
  cursor: pointer;
  background: #ffffff;
  color: black;
  transition: 0.3s;
  font-weight: bold;
}

.option:hover {
  transform: scale(1.05);
}

/* EFECTOS */
.correct {
  background: #00e676 !important;
  animation: pulse 0.5s infinite alternate;
}

.wrong {
  background: #ff1744 !important;
  color: white;
}

@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.08); }
}

/* BOTONES */
button {
  margin-top: 30px;
  padding: 15px 40px;
  font-size: 20px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: gold;
  font-weight: bold;
}

/* PANTALLAS */
.screen {
  display: none;
}

.active {
  display: block;
}

/* RESULTADO */
.result {
  font-size: 40px;
}
</style>

</head>
<body>

<div class="scoreboard">
  Puntos: <span id="score">0</span>
</div>

<div class="container">

  <!-- INICIO -->
  <div id="start" class="screen active">
    <h1>Concurso Bíblico</h1>
    <p>Sube tu archivo de preguntas</p>
    <input type="file" id="fileInput">

    <br><br>

    <button onclick="downloadExample()">Descargar ejemplo</button>
    <button onclick="startGame()">Comenzar</button>
  </div>

  <!-- JUEGO -->
  <div id="game" class="screen">
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <button id="nextBtn" style="display:none;">Siguiente</button>
  </div>

  <!-- RESULTADO -->
  <div id="end" class="screen">
    <h1>Resultado Final</h1>
    <div class="result" id="finalScore"></div>
    <button onclick="location.reload()">Reiniciar</button>
  </div>

</div>

<!-- SONIDOS -->
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>

<script>
let questions = [];
let current = 0;
let score = 0;
let answered = false;

const scoreEl = document.getElementById("score");
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

function downloadExample() {
  const content = `Pregunta|Opcion1|Opcion2|Opcion3|Opcion4|Respuesta
¿Quién construyó el arca?|Moisés|Noé|Abraham|David|1
¿Primer libro de la Biblia?|Éxodo|Génesis|Levítico|Números|1`;

  const blob = new Blob([content], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "preguntas.txt";
  link.click();
}

function startGame() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Sube un archivo primero");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const lines = e.target.result.split("\n").slice(1);

    questions = lines.map(line => {
      const parts = line.split("|");
      return {
        question: parts[0],
        options: [parts[1], parts[2], parts[3], parts[4]],
        answer: parseInt(parts[5])
      };
    });

    changeScreen("game");
    loadQuestion();
  };

  reader.readAsText(file);
}

function changeScreen(screen) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
}

function loadQuestion() {
  answered = false;
  document.getElementById("nextBtn").style.display = "none";

  const q = questions[current];
  document.getElementById("question").textContent = q.question;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((opt, i) => {
    const div = document.createElement("div");
    div.textContent = opt;
    div.classList.add("option");

    div.onclick = () => selectOption(div, i);

    optionsDiv.appendChild(div);
  });
}

function selectOption(el, i) {
  if (answered) return;

  const correct = questions[current].answer;

  if (i === correct) {
    el.classList.add("correct");
    correctSound.play();
    score++;
    scoreEl.textContent = score;
    answered = true;
    document.getElementById("nextBtn").style.display = "block";
  } else {
    el.classList.add("wrong");
    wrongSound.play();
  }
}

document.getElementById("nextBtn").onclick = () => {
  current++;

  if (current < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
};

function showResult() {
  changeScreen("end");
  document.getElementById("finalScore").textContent =
    score + " / " + questions.length;
}
</script>

</body>
</html>
